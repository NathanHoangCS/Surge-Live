<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surge Live</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Virtual Coins Only</p>
          <h1>Surge Live</h1>
        </div>
        <div class="balance-card">
          <span>Your Balance</span>
          <strong id="user-balance">$0</strong>
        </div>
        <div class="auth-controls">
          <form id="auth-form">
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Password" required />
            <button type="submit" id="auth-submit">Login</button>
          </form>
          <button id="logout-btn" style="display: none;">Logout</button>
        </div>
      </header>

      <section class="grid-layout">
        <article class="panel market-panel">
          <div class="panel-title-row">
            <h2>Live Markets</h2>
            <button class="ghost-btn">Reset Demo</button>
          </div>
          <p class="small-note">Market cards will go here next branch.</p>
        </article>

        <article class="panel">
          <h2>Your Picks</h2>
          <p class="small-note">Your pending/won/lost picks will appear here.</p>
        </article>

        <article class="panel">
          <h2>Leaderboard</h2>
          <p class="small-note">Top players and balances will appear here.</p>
        </article>

        <article class="panel">
          <h2>Settle Markets</h2>
          <p class="small-note">Admin controls to settle winners go here.</p>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
